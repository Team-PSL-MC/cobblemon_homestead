name: Homestead Tools

on:
  release:
    types: [published] # Triggers only when you create/publish a GitHub Release
  workflow_dispatch:   # Allows manual trigger for testing

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: 🔍 Validate JSON
        run: python scripts/validate_json.py

      - name: 📝 Update Wiki & CSV
        run: |
          python scripts/gen_legendaries.py
          python scripts/gen_regional.py
          # Note: Ensure one of your scripts or a third one generates the full_spawn_list.csv

      - name: 🚀 Commit Wiki Changes
        run: |
          git config --global user.name "Homestead-Bot"
          git config --global user.email "bot@homestead.com"
          git add wiki/cobblemon-gameplay/*.md full_spawn_list.csv
          # Only commit if there are actually changes to avoid workflow errors
          git diff --quiet && git diff --staged --quiet || (git commit -m "docs: sync regional & legendary spawn tables" && git push)

      - name: 🚀 Create/Update Release Assets
        uses: softprops/action-gh-release@v2
        with:
          # This uses the tag from the release that triggered the workflow
          files: |
            Homestead-DP-*.zip
            full_spawn_list.csv
          body: |
            ## 🛠️ Automated Data Pack Build
            This release contains the latest spawn logic and legendary updates.
            
            **Included Wiki Updates:**
            - Updated Legendaries Table
            - Updated Regional Spawn Tables
            - Generated full_spawn_list.csv
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
