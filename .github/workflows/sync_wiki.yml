name: Homestead Tools Rolling Release

on:
  push:
    branches:
      - main
    paths:
      - 'data/cobblemon/**'
      - 'raiddens/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-sync:
    runs-on: ubuntu-latest
    steps:
      - name: 🛰️ Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🔍 Validate & Generate
        run: |
          python scripts/validate_json.py
          python scripts/gen_legendaries.py
          python scripts/gen_regional.py

      - name: 📦 Package Datapack
        run: |
          zip -r "Homestead-DP-Latest.zip" data/ pack.mcmeta pack.png

      - name: 🚀 Sync to GitBook
        run: |
          git config user.name "Homestead-Bot"
          git config user.email "bot@homestead.com"
          git add wiki/cobblemon-gameplay/*.md full_spawn_list.csv
          if ! git diff --cached --quiet; then
            git commit -m "docs: automated sync (rolling update) [skip ci]"
            git push origin HEAD:main
          fi

      - name: 🏷️ Force Move 'latest' Tag
        run: |
          git tag -f latest
          git push -f origin latest

      - name: 🔄 Update Rolling Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest Build (Rolling)"
          body: |
            ## 🔄 Auto-Updated Release
            **Last Update:** ${{ github.event.head_commit.timestamp }}
            **Latest Commit:** ${{ github.sha }}
          draft: false
          prerelease: false
          files: |
            Homestead-DP-Latest.zip
            full_spawn_list.csv
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
