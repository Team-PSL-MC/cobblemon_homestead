name: Homestead Tools Release

on:
  push:
    branches:
      - main
    paths:
      - 'data/cobblemon/**'
      - 'raiddens/**'
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-sync:
    runs-on: ubuntu-latest
    steps:
      - name: 🛰️ Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🔍 Validate & Generate
        run: |
          python scripts/validate_json.py
          python scripts/gen_legendaries.py
          python scripts/gen_regional.py

      - name: 📦 Package Datapack
        run: |
          VERSION="${{ github.event.release.tag_name || 'latest' }}"
          zip -r "Homestead-DP-$VERSION.zip" data/ pack.mcmeta pack.png

      - name: 🚀 Sync to GitBook
        if: github.event_name != 'release'
        run: |
          git config user.name "Homestead-Bot"
          git config user.email "bot@homestead.com"
          git add wiki/cobblemon-gameplay/*.md full_spawn_list.csv
          if ! git diff --cached --quiet; then
            git commit -m "docs: automated sync (data change) [skip ci]"
            git push origin HEAD:${{ github.event.repository.default_branch }}
          else
            echo "No relevant documentation changes detected."
          fi

      - name: 🚀 Upload Assets to Release
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'release'
        with:
          files: |
            Homestead-DP-*.zip
            full_spawn_list.csv
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
