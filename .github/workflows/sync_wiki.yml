name: Homestead Tools Versioned Release

on:
  push:
    branches:
      - main
    paths:
      - 'data/cobblemon/**'
      - 'raiddens/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    # PREVENT LOOP: Do not run if the commit was made by the bot itself
    if: github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest
    steps:
      - name: 🛰️ Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: 🔢 Determine Next Version
        id: versioning
        run: |
          git fetch --tags
          # Look for the highest numeric tag
          LATEST_TAG=$(git tag -l "[0-9]*" --sort=-v:refname | head -n 1)
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG=0
          fi
          NEXT_TAG=$((LATEST_TAG + 1))
          echo "next_tag=$NEXT_TAG" >> $GITHUB_OUTPUT

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🔍 Validate & Generate
        run: |
          python scripts/validate_json.py
          python scripts/gen_legendaries.py
          python scripts/gen_regional.py

      - name: 📦 Package Datapack
        run: |
          zip -r "Homestead-DP-${{ steps.versioning.outputs.next_tag }}.zip" data/ pack.mcmeta pack.png

      - name: 🚀 Sync to GitBook
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add wiki/cobblemon-gameplay/*.md full_spawn_list.csv
          if ! git diff --cached --quiet; then
            git commit -m "docs: sync for build ${{ steps.versioning.outputs.next_tag }} [skip ci]"
            git push origin HEAD:main
          fi

      - name: 🚀 Create New Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.versioning.outputs.next_tag }}
          name: "Build #${{ steps.versioning.outputs.next_tag }}"
          body: "Automated build for commit ${{ github.sha }}"
          files: |
            Homestead-DP-*.zip
            full_spawn_list.csv
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
