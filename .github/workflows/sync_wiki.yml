name: Homestead Tools Versioned Release

on:
  push:
    branches:
      - main
    paths:
      - 'data/cobblemon/**'
      - 'raiddens/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: 🛰️ Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Needed to see previous tags

      - name: 🔢 Determine Next Version
        id: versioning
        run: |
          # Fetch all tags from origin
          git fetch --tags
          # Get the latest tag, default to 0 if none exist
          LATEST_TAG=$(git tag --sort=-v:refname | head -n 1)
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG=0
          fi
          # Increment the number
          NEXT_TAG=$((LATEST_TAG + 1))
          echo "next_tag=$NEXT_TAG" >> $GITHUB_OUTPUT
          echo "Building Version: $NEXT_TAG"

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🔍 Validate & Generate
        run: |
          python scripts/validate_json.py
          python scripts/gen_legendaries.py
          python scripts/gen_regional.py

      - name: 📦 Package Datapack
        run: |
          # Use the incremented tag for the filename
          zip -r "Homestead-DP-${{ steps.versioning.outputs.next_tag }}.zip" data/ pack.mcmeta pack.png

      - name: 🚀 Sync to GitBook
        run: |
          git config user.name "Homestead-Bot"
          git config user.email "bot@homestead.com"
          git add wiki/cobblemon-gameplay/*.md full_spawn_list.csv
          if ! git diff --cached --quiet; then
            git commit -m "docs: sync for v${{ steps.versioning.outputs.next_tag }} [skip ci]"
            git push origin HEAD:main
          fi

      - name: 🚀 Create New Version Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.versioning.outputs.next_tag }}
          name: "Build #${{ steps.versioning.outputs.next_tag }}"
          body: |
            ## 📦 Build Updates
            - **Version:** ${{ steps.versioning.outputs.next_tag }}
            - **Commit:** ${{ github.sha }}
            
            This build was automatically triggered by data changes.
          files: |
            Homestead-DP-*.zip
            full_spawn_list.csv
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
