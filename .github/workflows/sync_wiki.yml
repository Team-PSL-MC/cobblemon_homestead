name: Homestead Tools Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-sync:
    runs-on: ubuntu-latest
    steps:
      - name: 🛰️ Checkout Repo
        uses: actions/checkout@v4
        with:
          # Fetch all history so the bot can push back to the branch
          fetch-depth: 0 

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🔍 Validate & Generate
        run: |
          python scripts/validate_json.py
          python scripts/gen_legendaries.py
          python scripts/gen_regional.py
          # Ensure these scripts output directly to your GitBook-synced folders
          # e.g., docs/legendaries.md

      - name: 📦 Package Datapack
        run: |
          # Creates a zip of the data folder and manifest
          zip -r "Homestead-DP-${{ github.event.release.tag_name || 'manual' }}.zip" data/ pack.mcmeta pack.png

      - name: 🚀 Sync to GitBook (via Git Push)
        run: |
          git config user.name "Homestead-Bot"
          git config user.email "bot@homestead.com"
          
          # Add the generated markdown and CSV
          git add wiki/cobblemon-gameplay/*.md full_spawn_list.csv
          
          # Only commit if GitBook actually has something new to see
          if ! git diff --cached --quiet; then
            git commit -m "docs: automated sync for release ${{ github.event.release.tag_name }}"
            git push origin HEAD:${{ github.event.repository.default_branch }}
          else
            echo "No changes to sync to GitBook."
          fi

      - name: 🚀 Upload Assets to Release
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'release'
        with:
          files: |
            Homestead-DP-*.zip
            full_spawn_list.csv
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
