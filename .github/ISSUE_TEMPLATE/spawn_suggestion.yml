name: Pokémon Spawn Suggestion
description: Suggest a change or addition to Pokémon spawn data
title: "[Spawn Suggestion]: "
labels: ["spawn balance"]
body:

  - type: input
    id: pokemon
    attributes:
      label: Pokémon Name
      description: Which Pokémon should have its spawn adjusted?
      placeholder: Litwick
    validations:
      required: true

  - type: input
    id: biome
    attributes:
      label: Biome
      description: What biome should this spawn in?
      placeholder: Soul Sand Valley
    validations:
      required: true

  - type: dropdown
    id: time
    attributes:
      label: Time of Day
      options:
        - Any
        - Day
        - Night
        - Dawn
        - Dusk
    validations:
      required: false

  - type: textarea
    id: change
    attributes:
      label: Suggested Change
      description: Describe what spawn change you are suggesting
      placeholder: Increase spawn weight or add spawn entry
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: Why should this change be made?
      description: Explain why this spawn would improve gameplay or balance
      placeholder: This Pokémon is currently extremely rare in this biome
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Additional Notes
      description: Optional extra context or testing results
