name: Questline Suggestion
description: Suggest a complete questline with progression, rewards, and optional draft JSON/SNBT links
title: "[Questline Suggestion]: "
labels: ["quests", "questline"]
body:

  - type: input
    id: questline_name
    attributes:
      label: Questline Name
      description: Name of the overall questline
      placeholder: Cobblemon Starter Journey
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Primary Focus
      description: Main focus for the questline
      options:
        - Cobblemon
        - Create / Automation
        - Mekanism / Tech
        - Exploration
        - Gyms / Battle Challenges
        - Economy
        - Farming
        - Tutorial
        - Multi-Theme
    validations:
      required: true

  - type: textarea
    id: questline_description
    attributes:
      label: Description
      description: Overview of what this questline teaches or encourages
      placeholder: "Guides the player from catching their first Cobblemon to defeating a player-built gym."
    validations:
      required: true

  - type: textarea
    id: questline_flow
    attributes:
      label: Quest Flow / Path
      description: Describe each step, chapter, or milestone. Include prerequisites.
      placeholder: |
        Example:
        Chapter 1: Starter Pokémon
          - Catch your first Pokémon
          - Build a Pokéball Storage Box
        Chapter 2: Early Exploration
          - Claim your first land
          - Capture 3 different Pokémon from your region
    validations:
      required: true

  - type: textarea
    id: snbt_json
    attributes:
      label: Optional Draft JSON/SNBT
      description: Paste your SNBT or JSON draft here, or provide a link to a file
      placeholder: "Paste your questline SNBT/JSON here or link to a GitHub gist"
    validations:
      required: false

  - type: textarea
    id: rewards
    attributes:
      label: Quest Rewards
      description: Suggest balanced rewards for each chapter or milestone
      placeholder: |
        Chapter 1:
          - 5 Pokéballs
          - 500 CobbleDollars
        Chapter 2:
          - Master Ball
          - Access to advanced mods
    validations:
      required: true

  - type: textarea
    id: progression_notes
    attributes:
      label: Progression / Difficulty Notes
      description: Explain when this questline should be accessible, expected time, and difficulty
      placeholder: "Early game, designed for solo or small group play."
    validations:
      required: true

  - type: textarea
    id: additional_notes
    attributes:
      label: Additional Notes
      description: Any extra context or suggestions
